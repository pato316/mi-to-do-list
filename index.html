--text6: #C4C0BA;\n      --elem-bg: rgba(0,0,0,0.06); --elem-bg2: rgba(0,0,0,0.07);\n      --border: rgba(0,0,0,0.1); --divider: rgba(0,0,0,0.05);\n      --input-border: rgba(0,0,0,0.1);\n    }\n    [data-dark=\"true\"] {\n      --app-bg: #1A1816; --surface: #2C2926; --surface2: #242120;\n      --text1: #F0EDE8; --text2: #C4C0BA; --text3: #9A9490;\n      --text4: #7A7672; --text5: #6A6662; --text6: #4A4642;\n      --elem-bg: rgba(255,255,255,0.08); --elem-bg2: rgba(255,255,255,0.1);\n      --border: rgba(255,255,255,0.12); --divider: rgba(255,255,255,0.07);\n      --input-border: rgba(255,255,255,0.15);\n    }\n    \u002F* Rich text note rendering *\u002F\n    .note-content b { font-weight: 700; }\n    .note-content .nc-red { color: #DC2626; }\n    .note-content .nc-orange { color: #C85E28; }\n    .note-content .nc-blue { color: #2563EB; }\n    .note-content .nc-green { color: #16A34A; }\n\n    \u002F* Column count control: 1-4 quick-tap buttons on phones, a 1-10\n       dropdown on wide (desktop) screens where more columns fit. *\u002F\n    .col-select-desktop { display: none; }\n    @media (min-width: 700px) {\n      .col-buttons-mobile { display: none !important; }\n      .col-select-desktop { display: inline-block; }\n      [data-app-root] { width: clamp(360px, 98vw, 3000px) !important; }\n    }\n\n    \u002F* Desktop: scale the whole app up on wide screens so it's not a tiny\n       phone-shaped box floating in the middle of a big monitor. Phones stay\n       untouched — these breakpoints only kick in well above phone widths. *\u002F\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 32px 0;\">\n  <div data-app-root=\"\" data-dark=\"{{ darkMode }}\" style=\"width: 360px; height: 640px; background: var(--app-bg, #F7F4EF); border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.07); position: relative; overflow: hidden; display: flex; flex-direction: column;\">\n\n    <!-- Header -->\n    <div style=\"padding: 14px 16px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;\">\n      <div style=\"display: flex; flex-direction: column; gap: 1px;\">\n        <span style=\"font-size: 22px; font-weight: 700; color: var(--text1, #1A1816); letter-spacing: -0.5px; line-height: 1;\">Tareas<\u002Fspan>\n        <sc-if value=\"{{ lastSaved }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size: 9px; color: var(--text6, #C4C0BA); font-weight: 400; letter-spacing: 0.2px;\">Guardado {{ lastSaved }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 5px; align-items: center;\">\n        <button onclick=\"{{ toggleSearch }}\" style=\"border: none; background: var(--elem-bg, rgba(0,0,0,0.06)); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><circle cx=\"6.5\" cy=\"6.5\" r=\"5\" stroke=\"#4A4642\" stroke-width=\"1.5\"><\u002Fcircle><path d=\"M10.5 10.5L14 14\" stroke=\"#4A4642\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <button onclick=\"{{ openMenu }}\" style=\"border: none; background: var(--elem-bg, rgba(0,0,0,0.06)); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"16\" height=\"4\" viewBox=\"0 0 16 4\" fill=\"none\"><circle cx=\"2\" cy=\"2\" r=\"1.5\" fill=\"#4A4642\"><\u002Fcircle><circle cx=\"8\" cy=\"2\" r=\"1.5\" fill=\"#4A4642\"><\u002Fcircle><circle cx=\"14\" cy=\"2\" r=\"1.5\" fill=\"#4A4642\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Project chips + column toggle -->\n    <div style=\"padding: 0 16px 8px; display: flex; gap: 0; flex-shrink: 0; align-items: center;\">\n    <div style=\"flex: 1; display: flex; gap: 6px; overflow-x: auto; min-width: 0;\">\n      <sc-for list=\"{{ projects }}\" as=\"proj\" hint-placeholder-count=\"2\">\n        <button onclick=\"{{ proj.select }}\" style=\"border: none; padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; flex-shrink: 0; background: {{ proj.chipBg }}; color: {{ proj.chipColor }}; transition: opacity 0.15s;\">{{ proj.name }}<\u002Fbutton>\n      <\u002Fsc-for>\n      <button onclick=\"{{ toggleAddProject }}\" style=\"border: none; background: var(--elem-bg, rgba(0,0,0,0.05)); color: var(--text3, #7A7672); padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 400; flex-shrink: 0; line-height: 1;\">+<\u002Fbutton>\n    <\u002Fdiv>\n    <!-- Column toggle -->\n    <div style=\"flex-shrink: 0; margin-left: 8px; display: flex; flex-direction: column; align-items: center; gap: 2px;\">\n      <span style=\"font-size: 9px; font-weight: 500; color: #B0ACA6; text-transform: uppercase; letter-spacing: 0.5px;\" data-om-label=\"Columnas\">Columnas<\u002Fspan>\n      <div class=\"col-buttons-mobile\" style=\"display: flex; gap: 1px; background: var(--elem-bg2, rgba(0,0,0,0.07)); border-radius: 7px; padding: 2px;\">\n        <sc-for list=\"{{ colOptions }}\" as=\"co\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ co.select }}\" style=\"border: none; width: 20px; height: 18px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: 600; background: {{ co.bg }}; color: {{ co.color }}; line-height: 1;\">{{ co.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <select class=\"col-select-desktop\" value=\"{{ columns }}\" onchange=\"{{ setColumnsSelect }}\" style=\"border: 1px solid var(--border, rgba(0,0,0,0.12)); background: var(--surface, white); color: var(--text1, #1A1816); border-radius: 6px; padding: 2px 4px; font-size: 11px; cursor: pointer;\">\n        <option value=\"1\">1<\u002Foption>\n        <option value=\"2\">2<\u002Foption>\n        <option value=\"3\">3<\u002Foption>\n        <option value=\"4\">4<\u002Foption>\n        <option value=\"5\">5<\u002Foption>\n        <option value=\"6\">6<\u002Foption>\n        <option value=\"7\">7<\u002Foption>\n        <option value=\"8\">8<\u002Foption>\n        <option value=\"9\">9<\u002Foption>\n        <option value=\"10\">10<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Add project input -->\n    <sc-if value=\"{{ addingProject }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding: 0 20px 10px; display: flex; gap: 8px; animation: fadeInScale 0.15s ease; flex-shrink: 0;\">\n        <input value=\"{{ newProjectName }}\" onchange=\"{{ setNewProjectName }}\" onkeydown=\"{{ onProjectKeyDown }}\" placeholder=\"Nombre del proyecto...\" style=\"flex: 1; border: 1.5px solid #C85E28; border-radius: 10px; padding: 9px 13px; font-size: 14px; background: var(--surface, white); outline: none; color: var(--text1, #1A1816);\">\n        <button onclick=\"{{ addProject }}\" style=\"border: none; background: #C85E28; color: white; padding: 9px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;\">OK<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Filter chips -->\n    <div style=\"padding: 0 16px 6px; display: flex; gap: 5px; overflow-x: auto; flex-shrink: 0;\">\n      <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ f.select }}\" style=\"border: none; padding: 5px 13px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; flex-shrink: 0; background: {{ f.bg }}; color: {{ f.color }};\">{{ f.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Search input -->\n    <sc-if value=\"{{ searchOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding: 0 16px 6px; flex-shrink: 0; animation: fadeInScale 0.15s ease;\">\n        <input value=\"{{ searchQuery }}\" onchange=\"{{ onSearch }}\" placeholder=\"Buscar tareas...\" style=\"width: 100%; border: 1.5px solid var(--input-border, rgba(0,0,0,0.12)); border-radius: 10px; padding: 9px 14px; font-size: 14px; background: var(--surface, white); outline: none; color: var(--text1, #1A1816);\">\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Split content -->\n    <div data-split-container=\"\" style=\"flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;\">\n\n    <!-- Tasks pane -->\n    <div style=\"height: {{ tasksPaneHeight }}; overflow-y: auto; padding-bottom: 8px; flex-shrink: 0;\">\n\n      <!-- Task groups + cards -->\n      <sc-for list=\"{{ groupedItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n\n        <!-- Group header -->\n        <sc-if value=\"{{ item.isGroup }}\" hint-placeholder-val=\"{{ false }}\">\n          <div data-drop-group-id=\"{{ item.id }}\" style=\"padding: 12px 16px 8px; margin: 4px 10px 0; display: flex; align-items: center; justify-content: space-between; border-radius: 10px; background: {{ item.dropBg }}; transition: background 0.15s; height: 25px\">\n            <span style=\"font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: {{ item.dropColor }};\">{{ item.name }}<\u002Fspan>\n            <span style=\"font-size: 11px; color: var(--text6, #C4C0BA); background: var(--elem-bg, rgba(0,0,0,0.05)); min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px;\">{{ item.count }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Task row (1-4 columns) -->\n        <sc-if value=\"{{ item.isTaskRow }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; gap: 5px; margin: 0 10px 5px;\">\n            <sc-for list=\"{{ item.cards }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <div data-task-id=\"{{ c.id }}\" onclick=\"{{ c.open }}\" onpointerdown=\"{{ c.startDrag }}\" style=\"flex: 1; min-width: 0; border-radius: 10px; padding: 8px 7px 7px; cursor: pointer; position: relative; user-select: none; background: {{ c.cardBg }}; border-left: 3px solid {{ c.statusColor }}; box-shadow: 0 2px 8px rgba(0,0,0,0.07);\">\n                <div data-drag-handle=\"{{ c.id }}\" style=\"position: absolute; top: 6px; right: 5px; width: 22px; height: 22px; display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center; cursor: grab; opacity: 0.25; touch-action: none;\">\n                  <div style=\"width: 8px; height: 1.5px; background: #1A1816; border-radius: 1px;\"><\u002Fdiv>\n                  <div style=\"width: 8px; height: 1.5px; background: #1A1816; border-radius: 1px;\"><\u002Fdiv>\n                  <div style=\"width: 8px; height: 1.5px; background: #1A1816; border-radius: 1px;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ c.hasPriority }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position: absolute; top: 7px; left: 4px; width: 4px; height: 4px; border-radius: 50%; background: #C85E28;\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font-size: {{ c.titleSize }}; font-weight: 500; color: var(--text1, #1A1816); line-height: 1.3; margin-bottom: 5px; padding: 0 14px 0 5px; text-decoration: {{ c.titleDecoration }}; opacity: {{ c.titleOpacity }}; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;\">{{ c.title }}<\u002Fdiv>\n                <div style=\"display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 5px; min-height: 2px;\">\n                  <sc-if value=\"{{ c.hasPerson }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 9px; background: #FEF3C7; color: #92400E; padding: 1px 4px; border-radius: 5px;\">👤<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ c.hasReminder }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 9px; background: #FEE2E2; color: #991B1B; padding: 1px 4px; border-radius: 5px;\">⏰<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ c.hasChecklist }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 9px; background: #EDE9FE; color: #5B21B6; padding: 1px 4px; border-radius: 5px;\">{{ c.checklistProgress }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display: flex; gap: 2px; justify-content: flex-end;\">\n                  <button onclick=\"{{ c.toggleDone }}\" style=\"border: none; padding: 3px 7px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 600; background: {{ c.doneBtnBg }}; color: {{ c.doneBtnColor }}; line-height: 1;\">{{ c.doneBtnLabel }}<\u002Fbutton>\n                  <button onclick=\"{{ c.more }}\" style=\"border: none; background: var(--elem-bg2, rgba(0,0,0,0.07)); color: #6B6662; padding: 3px 6px; border-radius: 6px; cursor: pointer; font-size: 10px; letter-spacing: 1px; line-height: 1;\">···<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <!-- Empty fill slots -->\n            <sc-for list=\"{{ item.empties }}\" as=\"em\" hint-placeholder-count=\"0\">\n              <div style=\"flex: 1; min-width: 0;\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsc-for>\n\n      <!-- Empty state -->\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding: 48px 20px; text-align: center;\">\n          <div style=\"width: 56px; height: 56px; border-radius: 28px; background: var(--elem-bg, rgba(0,0,0,0.05)); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M4 6h14M4 11h9M4 16h6\" stroke=\"#A8A49E\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size: 14px; color: var(--text6, #C4C0BA); font-weight: 500;\">Sin tareas aquí<\u002Fdiv>\n          <div style=\"font-size: 12px; color: #D4D0CA; margin-top: 4px;\">Toca + para crear una<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv><!-- \u002Ftasks pane -->\n\n    <!-- Drag handle -->\n    <div data-split-bar=\"true\" style=\"flex-shrink: 0; height: 28px; display: flex; align-items: center; justify-content: center; cursor: row-resize; touch-action: none; background: transparent;\">\n      <div style=\"width: 36px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.14);\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Notes pane -->\n    <div style=\"flex: 1; overflow-y: auto; min-height: 0;\">\n      <!-- Notes section header -->\n      <div onclick=\"{{ toggleNotes }}\" style=\"padding: 4px 20px 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; height: 30px\">\n        <div style=\"display: flex; align-items: center; gap: 8px;\">\n          <span style=\"font-size: 18px; font-weight: 700; color: var(--text1, #1A1816); letter-spacing: -0.4px;\">Notas<\u002Fspan>\n          <sc-if value=\"{{ hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-size: 11px; color: var(--text6, #C4C0BA); background: var(--elem-bg, rgba(0,0,0,0.05)); min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px;\">{{ notesCount }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 6px; align-items: center;\">\n          <div onclick=\"{{ stopProp }}\" class=\"col-buttons-mobile\" style=\"display: flex; gap: 1 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text5, #A8A49E); margin-bottom: 8px;\">Nota<\u002Fdiv>\n          <!-- Rich text toolbar -->\n          <div style=\"display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap;\">\n            <button onclick=\"{{ rtBold }}\" style=\"border: 1px solid var(--border, rgba(0,0,0,0.1)); background: var(--surface, white); color: var(--text1, #1A1816); width: 30px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 700; line-height: 1;\">B<\u002Fbutton>\n            <button onclick=\"{{ rtRed }}\" style=\"border: none; background: #FEE2E2; width: 30px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 700; color: #DC2626; line-height: 1;\">A<\u002Fbutton>\n            <button onclick=\"{{ rtOrange }}\" style=\"border: none; background: #FEF3C7; width: 30px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 700; color: #C85E28; line-height: 1;\">A<\u002Fbutton>\n            <button onclick=\"{{ rtBlue }}\" style=\"border: none; background: #DBEAFE; width: 30px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 700; color: #2563EB; line-height: 1;\">A<\u002Fbutton>\n            <button onclick=\"{{ rtGreen }}\" style=\"border: none; background: #D1FAE5; width: 30px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 700; color: #16A34A; line-height: 1;\">A<\u002Fbutton>\n            <span style=\"font-size: 10px; color: var(--text6, #C4C0BA); align-self: center; margin-left: 4px;\">selecciona texto primero<\u002Fspan>\n          <\u002Fdiv>\n          <textarea id=\"task-note-editor\" value=\"{{ activeTaskNote }}\" onchange=\"{{ updateTaskNote }}\" placeholder=\"Agrega una nota...\" style=\"width: 100%; border: 1.5px solid var(--input-border, rgba(0,0,0,0.08)); border-radius: 12px; padding: 12px 14px; font-size: 14px; background: var(--surface, white); outline: none; margin-bottom: 6px; color: var(--text1, #1A1816); resize: none; min-height: 78px; line-height: 1.5;\"><\u002Ftextarea>\n          <sc-if value=\"{{ activeTaskNoteRendered }}\" hint-placeholder-val=\"{{ false }}\">\n            <div id=\"note-preview\" class=\"note-content\" style=\"font-size: 13px; line-height: 1.55; color: var(--text2, #4A4642); background: var(--surface2, #F0EDE8); border-radius: 10px; padding: 10px 12px; margin-bottom: 18px;\"><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ activeTaskNoteEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-bottom: 22px;\"><\u002Fdiv>\n          <\u002Fsc-if>\n          <!-- Follow-up log -->\n          <div style=\"font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text5, #A8A49E); margin-bottom: 10px;\">Seguimiento<\u002Fdiv>\n          <sc-for list=\"{{ activeTaskFollowups }}\" as=\"log\" hint-placeholder-count=\"0\">\n            <div style=\"font-size: 13px; color: var(--text2, #4A4642); background: rgba(0,0,0,0.04); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; line-height: 1.45; display: flex; gap: 8px; align-items: flex-start;\">\n              <span style=\"color: var(--text6, #C4C0BA); flex-shrink: 0; margin-top: 1px;\">›<\u002Fspan>\n              <span style=\"flex: 1;\">{{ log.text }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display: flex; gap: 8px; margin-bottom: 22px;\">\n            <input value=\"{{ followupText }}\" onchange=\"{{ setFollowupText }}\" onkeydown=\"{{ onFollowupKeyDown }}\" placeholder=\"Anotar seguimiento...\" style=\"flex: 1; border: 1.5px solid var(--input-border, rgba(0,0,0,0.1)); border-radius: 10px; padding: 10px 12px; font-size: 13px; background: var(--surface, white); outline: none; color: var(--text1, #1A1816);\">\n            <button onclick=\"{{ addFollowup }}\" style=\"border: none; background: #1A1816; color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: 300; flex-shrink: 0; line-height: 1;\">+<\u002Fbutton>\n          <\u002Fdiv>\n          <!-- Checklist -->\n          <div style=\"font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text5, #A8A49E); margin-bottom: 10px;\">Checklist<\u002Fdiv>\n          <sc-for list=\"{{ activeTaskChecklist }}\" as=\"cli\" hint-placeholder-count=\"0\">\n            <div style=\"display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.05);\">\n              <button onclick=\"{{ cli.toggle }}\" style=\"width: 22px; height: 22px; border-radius: 50%; border: 2px solid {{ cli.doneBorderColor }}; background: {{ cli.doneBg }}; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700;\">{{ cli.checkmark }}<\u002Fbutton>\n              <span style=\"font-size: 14px; color: var(--text1, #1A1816); flex: 1; text-decoration: {{ cli.textDecoration }}; opacity: {{ cli.opacity }};\">{{ cli.text }}<\u002Fspan>\n              <button onclick=\"{{ cli.delete }}\" style=\"border: none; background: none; color: var(--text6, #C4C0BA); cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; font-weight: 300;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display: flex; gap: 8px; margin: 10px 0 22px;\">\n            <input value=\"{{ checklistItemText }}\" onchange=\"{{ setChecklistItem }}\" onkeydown=\"{{ onChecklistKeyDown }}\" placeholder=\"Nuevo ítem...\" style=\"flex: 1; border: 1.5px solid var(--input-border, rgba(0,0,0,0.1)); border-radius: 10px; padding: 10px 12px; font-size: 13px; background: var(--surface, white); outline: none; color: var(--text1, #1A1816);\">\n            <button onclick=\"{{ addChecklistItem }}\" style=\"border: none; background: # Fdiv>\n          <div style=\"font-size: 19px; font-weight: 600; color: var(--text1, #1A1816); margin-bottom: 14px; letter-spacing: -0.3px;\">Mover a...<\u002Fdiv>\n          <sc-for list=\"{{ moveTargets }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ g.moveTo }}\" style=\"width: 100%; border: none; background: var(--surface, white); color: var(--text1, #1A1816); padding: 15px 16px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 500; margin-bottom: 8px; text-align: left; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06);\">\n              <span>{{ g.name }}<\u002Fspan>\n              <span style=\"color: var(--text6, #C4C0BA); font-size: 18px;\">›<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"height: 10px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ MODAL: MAIN MENU ═══ -->\n    <sc-if value=\"{{ isMenuModal }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeModal }}\" style=\"position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end; z-index: 80; animation: fadeIn 0.15s ease;\">\n        <div onclick=\"{{ stopProp }}\" style=\"background: var(--app-bg, #F7F4EF); border-radius: 24px 24px 0 0; padding: 0 20px 20px; width: 100%; max-height: 78%; overflow-y: auto; animation: slideUp 0.22s ease;\">\n          <div style=\"width: 36px; height: 4px; background: rgba(0,0,0,0.12); border-radius: 2px; margin: 14px auto 20px;\"><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;\">\n            <div style=\"font-size: 19px; font-weight: 600; color: var(--text1, #1A1816); letter-spacing: -0.3px;\">Menú<\u002Fdiv>\n            <button onclick=\"{{ closeModal }}\" style=\"border: none; background: var(--elem-bg, rgba(0,0,0,0. %; border: none; background: var(--surface, white); color: var(--text1, #1A1816); padding: 15px 16px; border-radius: 12px; cursor: pointer; font-size: 15px; text-align: left; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 10px;\"><span>📥<\u002Fspan><span>Importar respaldo (JSON)<\u002Fspan><\u002Fbutton>\n          <div style=\"height: 1px; background: var(--divider, rgba(0,0,0,0.07)); margin-bottom: 12px;\"><\u002Fdiv>\n          <sc-if value=\"{{ showDeleteProjectButton }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ confirmDelete }}\" style=\"width: 100%; border: none; background: #FEE2E2; color: #DC2626; padding: 15px 16px; border-radius: 12px; cursor: pointer; font-size: 15px; text-align: left; display: flex; align-items: center; gap: 10px;\"><span>🗑<\u002Fspan><span>Eliminar «{{ activeProjectName }}»<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ confirmDeleteProject }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background: #FEE2E2; border-radius: 14px; padding: 16px; animation: fadeInScale 0.15s ease;\">\n              <div style=\"font-size: 14px; color: #DC2626; font-weight: 600; margin-bottom: 6px;\">¿Eliminar «{{ activeProjectName }}»?<\u002Fdiv>\n              <div style=\"font-size: 12px; color: #EF4444; margin-bottom: 14px;\">Se eliminarán todas sus tareas y grupos.<\u002Fdiv>\n              <div style=\"display: flex; gap: 8px;\">\n                <button onclick=\"{{ cancelDelete }}\" style=\"flex: 1; border: 1.5px solid var(--input-border, rgba(0,0,0,0.12)); background: var(--surface, white); color: var(--text1, #1A1816); padding: 11px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;\">Cancelar<\u002Fbutton>\n                <button onclick=\"{{ doDeleteProject }}\" style=\"flex: 1; border: none; background: #DC2626; color: white; padding: 11px; border-radius: 10px; cursor: pointer; font-  0);\n      const diff = Math.round((d - today) \u002F 86400000);\n      if (diff < 0) return 'Vencida';\n      if (diff === 0) return 'Hoy';\n      if (diff === 1) return 'Mañana';\n      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });\n    } catch (e) { return ''; }\n  }\n\n  formatDate(dateStr) {\n    if (!dateStr) return '';\n    try {\n      const [y, m, dd] = dateStr.split('-').map(Number);\n      return new Date(y, m - 1, dd).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });\n    } catch (e) { return ''; }\n  }\n\n  componentDidMount() {\n    \u002F\u002F Request persistent storage (prevents iOS\u002FAndroid from auto-clearing)\n    if (navigator.storage && navigator.storage.persist) {\n      navigator.storage.persist().catch(() => {});\n    }\n\n    this._initFirebaseSync();\n\n    \u002F\u002F Load from BOTH storages and use whichever has the most recent timestamp\n    let lsData = null, idbData = null;\n    try {\n      const ls = localStorage.getItem('tasks-app-v2');\n      if (ls) lsData = JSON.parse(ls);\n    } catch (e) {}\n\n    this._loadFromIDB().then(idb => {\n      idbData = idb;\n      \u002F\u002F Pick the most recent data based on savedAt timestamp\n      let best = null;\n      if (lsData && idbData) {\n        best = (idbData.savedAt || 0) >= (lsData.savedAt || 0) ? idbData : lsData;\n      } else {\n        best = idbData || lsData;\n      }\n      if (best && (best.tasks || best.projects)) {\n        this._lastLocalSave = best.savedAt || 0;\n        this.setState({\n          projects: best.projects || this.state.projects,\n          groups: best.groups || this.state.groups,\n          tasks: best.tasks || this.state.tasks,\n          notes: best.notes || this.state.notes,\n          activeProjectId: best.activeProjectId || this.state.activeProjectId,\n          darkMode: best.darkMode || false,\n          lastSaved: best.savedAt ? new Date(best.savedAt).toLocaleTimeString('es-ES', { hour: '2-digit', 1px';\n    inp.style.top = '50%';\n    inp.style.left = '50%';\n    document.body.appendChild(inp);\n    inp.onchange = () => {\n      if (range) {\n        const ws = window.getSelection();\n        ws.removeAllRanges();\n        ws.addRange(range);\n      }\n      this._applyNoteFormat('span', inp.value);\n      inp.remove();\n    };\n    inp.click();\n  }\n\n  _clearNoteFormat() {\n    const ce = document.getElementById('note-ce-editor');\n    if (!ce) return;\n    ce.focus();\n    const sel = window.getSelection();\n    if (!sel || sel.rangeCount === 0) return;\n    \u002F\u002F Walk selected nodes and strip formatting spans\u002Fb tags\n    const range = sel.getRangeAt(0);\n    const fragment = range.cloneContents();\n    const walker = document.createTreeWalker(fragment, NodeFilter.SHOW_TEXT);\n    const texts = [];\n    let node;\n    while ((node = walker.nextNode())) texts.push(node.textContent);\n    const text = document.createTextNode(texts.join(''));\n    range.deleteContents();\n    range.insertNode(text);\n    this.setState({ editingNoteContent: ce.innerHTML });\n  }\n\n  _applyNoteFormat(tag, color) {\n    const el = document.getElementById('note-ce-editor');\n    if (!el) return;\n    el.focus();\n    const sel = window.getSelection();\n    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;\n    const range = sel.getRangeAt(0);\n    const span = document.createElement(tag === 'b' ? 'b' : tag === 's' ? 's' : 'span');\n    if (color) span.style.color = color;\n    try {\n      range.surroundContents(span);\n    } catch(e) {\n      const extracted = range.extractContents();\n      span.appendChild(extracted);\n      range.insertNode(span);\n    }\n    sel.removeAllRanges();\n    this.setState({ editingNoteContent: el.innerHTML });\n  }\n\n  _wrapSelection(prefix, suffix) {\n    const el = document.getElementById('task-note-editor');\n    if (!el) return;\n    const start = el.selectionStart, end = el.selectionEnd;\n    const val = el.value;\n    if (start === end) return;\n    const selected = val.slice(start, end);\n    const newVal = val.slice(0, start) + prefix + selected + suffix + val.slice(end);\n    const taskId = this.state.activeTaskId;\n    if (taskId) this.updateTask(taskId, { note: newVal });\n    setTimeout(() => { el.focus(); el.setSelectionRange(start + prefix.length, end + prefix.length); }, 0);\n  }\n\n  _parseNote(text) {\n    if (!text) return '';\n    let html = text\n      .replace(\u002F&\u002Fg, '&amp;').replace(\u002F<\u002Fg, '&lt;').replace(\u002F>\u002Fg, '&gt;')\n      .replace(\u002F\\*\\*(.*?)\\*\\*\u002Fg, '<b>$1<\u002Fb>')\n      .replace(\u002F\\[r\\](.*?)\\[\\\u002Fr\\]\u002Fg, '<span class=\"nc-red\">$1<\u002Fspan>')\n      .replace(\u002F\\[o\\](.*?)\\[\\\u002Fo\\]\u002Fg, '<span class=\"nc-orange\">$1<\u002Fspan>')\n      .replace(\u002F\\[b\\](.*?)\\[\\\u002Fb\\]\u002Fg, '<span class=\"nc-blue\">$1<\u002Fspan>')\n      .replace(\u002F\\[g\\](.*?)\\[\\\u002Fg\\]\u002Fg, '<span class=\"nc-green\">$1<\u002Fspan>')\n      .replace(\u002F\\n\u002Fg, '<br>');\n    return html;\n  }\n\n  _stripNote(text) {\n    if (!text) return '';\n    return text\n      .replace(\u002F\\*\\*(.*?)\\*\\*\u002Fg, '$1')\n      .replace(\u002F\\[r\\](.*?)\\[\\\u002Fr\\]\u002Fg, '$1')\n      .replace(\u002F\\[o\\](.*?)\\[\\\u002Fo\\]\u002Fg, '$1')\n      .replace(\u002F\\[b\\](.*?)\\[\\\u002Fb\\]\u002Fg, '$1')\n      .replace(\u002F\\[g\\](.*?)\\[\\\u002Fg\\]\u002Fg, '$1');\n  }\n\n  \u002F\u002F Bump this on every deploy alongside the service worker CACHE version,\n  \u002F\u002F so both PC\u002Fphone can confirm at a glance they're on the same build.\n  _appVersion = 'v18';\n\n  \u002F\u002F ─── IndexedDB persistence ───\n  _dbName = 'taskboard-db';\n  _storeName = 'state';\n\n  async _openDB() {\n    return new Promise((res, rej) => {\n      const req = indexedDB.open(this._dbName, 1);\n      req.onupgradeneeded = e => e.target.result.createObjectStore(this._storeName);\n      req.onsuccess = e => res(e.target.result);\n      req.onerror = e => rej(e);\n    });\n  }\n\n  async _saveToIDB(data) {\n    try {\n      const db = await this._openDB();\n      const tx = db.transaction(this._storeName, 'readwrite');\n      tx.objectStore(this._storeName).put(data, 'main');\n    } catch (e) {}\n  }\n\n  async _loadFromIDB() {\n    try {\n      const db = await this._openDB();\n      return await new Promise((res) => {\n        const tx = db.transaction(this._storeName, 'readonly');\n        const req = tx.objectStore(this._storeName).get('main');\n        req.onsuccess = e => res(e.target.result || null);\n        req.onerror = () => res(null);\n      });\n    } catch (e) { return null; }\n  }\n\n  exportData() {\n    const { projects, groups, tasks, notes } = this.state;\n    const data = JSON.stringify({ projects, groups, tasks, notes }, null, 2);\n    const blob = new Blob([data], { type: 'application\u002Fjson' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'tasks-backup-' + this.todayStr() + '.json'; a.click();\n    URL.revokeObjectURL(url);\n    this.closeModal();\n  }\n\n  importData() {\n    const input = document.createElement('input');\n    input.type = 'file'; input.accept = '.json';\n    input.onchange = (e) => {\n      const file = e.target.files[0]; if (!file) return;\n      const reader = new FileReader();\n      reader.onload = (ev) => {\n        try {\n          const d = JSON.parse(ev.target.result);\n          if (d.projects && d.groups && d.tasks) {\n            this.setState({ projects: d.projects, groups: d.groups, tasks: d.tasks, notes: d.notes || [], activeProjectId: d.projects[0]?.id || this.state.activeProjectId, modal: null });\n          } else { alert('Archivo no válido.'); }\n        } catch (err) { alert('Error al leer el archivo.'); }\n      };\n      reader.readAsText(file);\n    };\n    input.click();\n    this.closeModal();\n  }\n\n  renderVals() {\n    const s = this.state;\n    const { projects, groups, tasks, notes, activeProjectId, activeFilter, searchQuery, modal, activeTaskId, activeNoteId, notesExpanded, newTitle, newNote, newGroupName, newProjectName, addingProject, confirmDeleteProject, editingValue, newChecklistItem, editingNoteContent } = s;\n\n    \u002F\u002F Light pastel backgrounds pick a dark-mode-friendly twin so text (which\n    \u002F\u002F switches to var(--text1), a light color, in dark mode) stays readable.\n    const PASTEL_DARK_MAP = {\n      '#FFFBE8': '#3D3426', '#FFF0EE': '#3D2B29', '#EDFAF3': '#1F3830',\n      '#F0EDFF': '#2E2A45', '#EDF3FF': '#1F2E45',\n    };\n    const themedColor = (c) => (c && s.darkMode) ? (PASTEL_DARK_MAP[c] || c) : c;\n\n    const activeProject = projects.find(p => p.id === activeProjectId);\n    const activeProjectColor = activeProject?.color || '#C85E28';\n    const projectGroups = groups.filter(g => g.projectId === activeProjectId);\n\n    \u002F\u002F Filtered tasks\n    const filteredTasks = tasks.filter(t => {\n      if (activeFilter === 'bin') return t.deleted && t.projectId === activeProjectId;\n      if (t.deleted || t.projectId !== activeProjectId) return false;\n      if (activeFilter === 'all') return true;\n      if (activeFilter === 'waiting') return t.status === 'waiting';\n      if (activeFilter === 'review') return t.status === 'review';\n      if (activeFilter === 'done') return t.status === 'done';\n      return true;\n    }).filter(t => !searchQuery || t.title.toLowerCase().includes(searchQuery.toLowerCase()));\n\n    const statusAccents = { open: null, waiting: '#E8A020', review: '#4A78CC', done: '#3DAA6A' };\n\n    const makeCard = (task) => {\n      const isDone = task.status === 'done';\n      const isDeleted = task.deleted;\n      const statusColor = statusAccents[task.status] || 'transparent';\n      return {\n        isGroup: false, isTask: true, id: task.id, title: task.title,\n        cardBg: themedColor(task.color) || (s.darkMode ? '#2C2926' : '#FFFFFF'), statusColor,\n        hasPriority: task.priority === 'high',\n        paddingRight: task.priority === 'high' ? '18px' : '0',\n        titleDecoration: isDone ? 'line-through' : 'none',\n        titleOpacity: isDone ? '0.5' : '1',\n        hasPerson: !!(task.person) && task.status === 'waiting',\n        person: task.person || '',\n        hasReminder: !!(task.reminder),\n        reminderLabel: this.formatReminder(task.reminder),\n        hasChecklist: task.checklist && task.checklist.length > 0,\n        checklistProgress: task.checklist ? (task.checklist.filter(i => i.done).length + '\u002F' + task.checklist.length) : '',\n        doneBtnBg: isDeleted ? '#DBEAFE' : (isDone ? '#3DAA6A' : 'rgba(0,0,0,0.07)'),\n        doneBtnColor: isDeleted ? '#1D4ED8' : (isDone ? '#FFF' : '#6B6662'),\n        doneBtnLabel: isDeleted ? '↩' : '✓',\n        titleSize,\n        open: () => isDeleted ? null : this.openTask(task.id),\n        startDrag: (e) => { if (!isDeleted) this._onCardPointerDown(e, task.id, false); },\n        startDragNow: (e) => {\n          e.stopPropagation();\n          if (isDeleted) return;\n          if (e.touches) {\n            this._onCardTouchStart(e, task.id, true);\n          } else {\n            this._onCardPointerDown(e, task.id, true);\n          }\n        },\n        toggleDone: (e) => { e.stopPropagation(); if (isDeleted) { this.updateTask(task.id, { deleted: false }); } else { this.toggleDone(task.id); } },\n        move: (e) => { e.stopPropagation(); this.setState({ modal: 'moveTask', activeTaskId: task.id }); },\n        more: (e) => { e.stopPropagation(); this.setState({ modal: 'taskMenu', activeTaskId: task.id }); },\n      };\n    };\n\n    \u002F\u002F Build grouped items\n    const groupedItems = [];\n    const cols = s.columns || 2;\n    const titleSizes = { 1: '13px', 2: '12px', 3: '11px', 4: '10px' };\n    const titleSize = titleSizes[cols] || '12px';\n\n    const makePairs = (allCards) => {\n      const rows = [];\n      for (let i = 0; i < allCards.length; i += cols) {\n        const chunk = allCards.slice(i, i + cols);\n        const empties = [];\n        for (let e = chunk.length; e < cols; e++) empties.push({ id: 'e' + e });\n        chunk.forEach(c => { c.titleSize = titleSize; });\n        rows.push({ isGroup: false, isTaskRow: true, cards: chunk, empties });\n      }\n      return rows;\n    };\n\n    \u002F\u002F Column options\n    const colOptions = [1, 2, 3, 4].map(n => ({\n      label: String(n),\n      bg: cols === n ? '#1A1816' : 'transparent',\n      color: cols === n ? '#F7F4EF' : '#7A7672',\n      select: () => this.setState({ columns: n }),\n    }));\n    const notesColOptions = [1, 2, 3, 4].map(n => ({\n      label: String(n),\n      bg: s.notesColumns === n ? '#1A1816' : 'transparent',\n      color: s.notesColumns === n ? '#F7F4EF' : 'var(--text3, #7A7672)',\n      select: () => this.setState({ notesColumns: n }),\n    }));\n    const checklistColOptions = [1, 2, 3, 4].map(n => ({\n      label: String(n),\n      bg: s.checklistColumns === n ? '#1A1816' : 'transparent',\n      color: s.checklistColumns === n ? '#F7F4EF' : 'var(--text3, #7A7672)',\n      select: () => this.setState({ checklistColumns: n }),\n    }));\n    if (activeFilter === 'bin') {\n      if (filteredTasks.length > 0) {\n        groupedItems.push({ isGroup: true, isTaskRow: false, id: 'bin', name: 'Eliminadas', count: filteredTasks.length, dropBg: 'transparent', dropColor: '#A8A49E' });\n        makePairs(filteredTasks.map(t => makeCard(t))).forEach(r => groupedItems.push(r));\n      }\n    } else {\n      projectGroups.forEach(group => {\n        const gt = filteredTasks.filter(t => t.groupId === group.id);\n        const isOver = s.dragActive && s.dragOverGroupId === group.id;\n        groupedItems.push({ isGroup: true, isTaskRow: false, id: group.id, name: group.name, count: gt.length, dropBg: isOver ? '#C85E28' : 'transparent', dropColor: isOver ? '#FFF' : '#A8A49E' });\n        if (gt.length > 0) {\n          makePairs(gt.map(t => makeCard(t))).forEach(r => groupedItems.push(r));\n        }\n      });\n    }\n\n    const activeTask = activeTaskId ? tasks.find(t => t.id === activeTaskId) : null;\n\n    \u002F\u002F Status options\n    const statusDefs = [\n      { key: 'open', label: 'Abierta', aBg: '#1A1816', aC: '#F7F4EF', iBg: 'rgba(0,0,0,0.07)', iC: '#4A4642' },\n      { key: 'waiting', label: 'Espera', aBg: '#E8A020', aC: '#FFF', iBg: '#FEF3C7', iC: '#92400E' },\n      { key: 'review', label: 'Revisar', aBg: '#4A78CC', aC: '#FFF', iBg: '#DBEAFE', iC: '#1D4ED8' },\n      { key: 'done', label: '✓ Lista', aBg: '#3DAA6A', aC: '#FFF', iBg: '#D1FAE5', iC: '#065F46' },\n    ];\n    const taskStatuses = statusDefs.map(st => ({\n      key: st.key, label: st.label,\n      bg: activeTask?.status === st.key ? st.aBg : st.iBg,\n      color: activeTask?.status === st.key ? st.aC : st.iC,\n      select: () => activeTask && this.updateTask(activeTask.id, { status: st.key }),\n    }));\n\n    \u002F\u002F Priority\n    const prioDefs = [\n      { key: 'high', label: '🔴 Alta', aBg: '#C85E28', aC: '#FFF', iBg: 'rgba(0,0,0,0.07)', iC: '#4A4642' },\n      { key: null, label: 'Normal', aBg: '#1A1816', aC: '#F7F4EF', iBg: 'rgba(0,0,0,0.07)', iC: '#4A4642' },\n    ];\n    const priorityOptions = prioDefs.map(p => ({\n      label: p.label,\n      bg: (activeTask?.priority === p.key) ? p.aBg : p.iBg,\n      color: (activeTask?.priority === p.key) ? p.aC : p.iC,\n      select: () => activeTask && this.updateTask(activeTask.id, { priority: p.key }),\n    }));\n\n    \u002F\u002F Colors\n    const colorVals = [null, '#FFFBE8', '#FFF0EE', '#EDFAF3', '#F0EDFF', '#EDF3FF'];\n    const colorOptions = colorVals.map(c => ({\n      bg: c || '#FFFFFF',\n      border: activeTask?.color === c ? '3px solid #1A1816' : '2px solid rgba(0,0,0,0.13)',\n      select: () => activeTask && this.updateTask(activeTask.id, { color: c }),\n    }));\n\n    \u002F\u002F Checklist\n    const activeTaskChecklist = activeTask ? activeTask.checklist.map(item => ({\n      id: item.id, text: item.text, done: item.done,\n      checkmark: item.done ? '✓' : '',\n      textDecoration: item.done ? 'line-through' : 'none',\n      opacity: item.done ? '0.5' : '1',\n      doneBorderColor: item.done ? '#3DAA6A' : 'rgba(0,0,0,0.2)',\n      doneBg: item.done ? '#3DAA6A' : 'transparent',\n      toggle: () => { const cl = activeTask.checklist.map(i => i.id === item.id ? Object.assign({}, i, { done: !i.done }) : i); this.updateTask(activeTask.id, { checklist: cl }); },\n      delete: () => { const cl = activeTask.checklist.filter(i => i.id !== item.id); this.updateTask(activeTask.id, { checklist: cl }); },\n    })) : [];\n\n    const activeTaskFollowups = activeTask ? (activeTask.followupLog || []).map((text, i) => ({ id: i, text })) : [];\n\n    \u002F\u002F Notes\n    const noteBgs = s.darkMode\n      ? ['#3D3426', '#3D2B29', '#1F3830', '#2E2A45', '#1F2E45', '#2C2926']\n      : ['#FFFBE8', '#FFF0EE', '#EDFAF3', '#F0EDFF', '#EDF3FF', '#FFFFFF'];\n    const activeNotes = notes.filter(n => n.projectId === activeProjectId).map((n, i) => {\n      const checklist = n.checklist || [];\n      const preview = (n.content || '').replace(\u002F<[^>]+>\u002Fg, '').replace(\u002F\\*\\*|(\\[\\\u002F?(r|o|b|g)\\])\u002Fg, '');\n      return {\n        id: n.id,\n        isText: !!preview.trim(),\n        isChecklist: checklist.length > 0,\n        preview,\n        checklistItems: checklist.slice(0, 4).map(it => ({\n          id: it.id, text: it.text,\n          checkmark: it.done ? '✓' : '○',\n          textDecoration: it.done ? 'line-through' : 'none',\n          opacity: it.done ? '0.55' : '1',\n        })),\n        hasChecklistMore: checklist.length > 4,\n        checklistMoreCount: Math.max(0, checklist.length - 4),\n        dateLabel: this.formatDate(n.createdAt),\n        bg: themedColor(n.color) || noteBgs[i % noteBgs.length],\n        open: () => this.openNote(n.id),\
